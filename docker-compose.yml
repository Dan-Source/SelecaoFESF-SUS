services:
  backend:
    build:
      context: ./backend
    container_name: odonto_backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://odonto:odonto@postgres:5432/odonto}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_CACHE_TTL_SECONDS=${REDIS_CACHE_TTL_SECONDS:-30}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-development-only}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    command: >
      sh -c "uv run alembic upgrade head &&
      if [ \"$ENVIRONMENT\" = \"development\" ]; then
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app;
      else
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: odonto_postgres
    environment:
      - POSTGRES_DB=odonto
      - POSTGRES_USER=odonto
      - POSTGRES_PASSWORD=odonto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odonto -d odonto"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: odonto_redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
    container_name: odonto_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  frontend_next:
  postgres_data:
  redis_data:
